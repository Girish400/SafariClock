<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>StandBy Clock</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #1c1c1e;
            --dim-opacity: 1;
            --shift-x: 0px;
            --shift-y: 0px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            opacity: var(--dim-opacity);
            transition: opacity 0.5s ease;
        }

        /* Container for Burn-in Protection */
        #app-container {
            transform: translate(var(--shift-x), var(--shift-y));
            transition: transform 1s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* StandBy Style Info Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 80%;
            max-width: 600px;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #8e8e93;
            font-weight: 500;
        }

        /* Flip Clock CSS */
        .clock-container {
            display: flex;
            gap: 20px;
            font-size: 8rem;
            font-weight: 700;
            perspective: 1000px;
        }

        .flip-card {
            background-color: var(--card-bg);
            padding: 20px 30px;
            border-radius: 20px;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Divider Line for realism */
        .flip-card::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background-color: black;
            z-index: 5;
        }

        .controls {
            margin-top: 3rem;
            display: flex;
            gap: 20px;
        }

        button {
            background: #2c2c2e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Landscape orientation warning */
        @media (orientation: portrait) {
            .clock-container { font-size: 5rem; flex-direction: column; }
            .flip-card { min-width: 140px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="top-bar">
        <div id="date-display">Mon, Jan 1</div>
        <div id="weather-battery">☀️ 72°F | 🔋 <span id="batt-level">--%</span></div>
    </div>

    <div class="clock-container">
        <div class="flip-card" id="hour">12</div>
        <div class="flip-card" id="minute">00</div>
    </div>

    <div class="controls">
        <button onclick="toggleDim()">🌙 Dim</button>
        <button onclick="requestWakeLock()" id="wake-btn">🔓 Enable Always-On</button>
    </div>
</div>

<script>
    // 1. Clock Logic
    function updateClock() {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes();
        
        // Format to 12-hour
        h = h % 12 || 12; 
        
        document.getElementById('hour').innerText = h.toString().padStart(2, '0');
        document.getElementById('minute').innerText = m.toString().padStart(2, '0');
        
        // Update Date
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Wake Lock (Always On Display)
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById('wake-btn').innerText = '🔒 Always-On Active';
            document.getElementById('wake-btn').style.color = '#32d74b';
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    // 3. Burn-In Protection (Pixel Shifting every minute)
    setInterval(() => {
        const x = Math.floor(Math.random() * 20) - 10; // Shift -10px to +10px
        const y = Math.floor(Math.random() * 20) - 10;
        document.documentElement.style.setProperty('--shift-x', `${x}px`);
        document.documentElement.style.setProperty('--shift-y', `${y}px`);
    }, 60000);

    // 4. Night Dim Mode
    let isDimmed = false;
    function toggleDim() {
        isDimmed = !isDimmed;
        document.documentElement.style.setProperty('--dim-opacity', isDimmed ? '0.3' : '1');
    }

    // 5. Battery API (Note: iOS Safari support varies, this degrades gracefully)
    if ('getBattery' in navigator) {
        navigator.getBattery().then(function(battery) {
            function updateBattery() {
                let level = Math.round(battery.level * 100) + '%';
                let icon = battery.charging ? '⚡' : '🔋';
                document.getElementById('batt-level').innerText = icon + ' ' + level;
            }
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
            battery.addEventListener('chargingchange', updateBattery);
        });
    }

    // 6. Service Worker Registration (For Offline PWA)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
