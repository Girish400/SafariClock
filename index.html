<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SafariClock">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4843/4843058.png">
    <title>SafariClock | StandBy</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #ff3b30; 
            --flip-speed: 0.6s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: color 0.5s ease;
        }

        /* Status Bar Info */
        .status-bar {
            position: absolute;
            top: env(safe-area-inset-top, 40px);
            width: 85%;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            opacity: 0.6;
            z-index: 10;
        }

        /* Main Container for Burn-in Protection */
        #burn-in-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Space between Time and Date */
            transition: transform 1s ease-in-out;
        }

        /* The Clock Layout */
        .clock {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flip-unit {
            position: relative;
            width: 90px;
            height: 130px;
            background: var(--card-bg);
            border-radius: 12px;
            font-size: 80px;
            font-weight: 700;
            line-height: 130px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        }

        /* Divider Line on Cards */
        .flip-unit::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 1px;
            background: rgba(0,0,0,0.4);
            z-index: 5;
        }

        .separator {
            font-size: 60px;
            font-weight: 700;
            color: var(--text-color);
            padding-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Date Styling */
        #date-display {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 3px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* Night Mode Red Theme */
        body.night-mode { color: var(--accent-color); }
        body.night-mode .flip-unit { color: var(--accent-color); border: 1px solid #400; }
        body.night-mode .separator { color: var(--accent-color); }

        /* Landscape / StandBy Mode Adjustments */
        @media (orientation: landscape) {
            .flip-unit { width: 160px; height: 220px; font-size: 140px; line-height: 220px; }
            .separator { font-size: 100px; }
            #date-display { font-size: 28px; }
            #burn-in-wrapper { gap: 30px; }
        }

        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="initApp()">
        <p style="font-size: 20px;">Tap to Launch SafariClock</p>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 10px;">Enabling Wake-Lock & Fullscreen</p>
    </div>

    <div class="status-bar">
        <div id="weather">PARIS 21°C</div>
        <div id="battery">--%</div>
    </div>

    <div id="burn-in-wrapper">
        <div class="clock">
            <div class="flip-unit" id="hr">00</div>
            <div class="separator">:</div>
            <div class="flip-unit" id="min">00</div>
            <div class="separator">:</div>
            <div class="flip-unit" id="sec">00</div>
        </div>
        <div id="date-display">LOADING DATE</div>
    </div>

    <script>
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock failed"); }
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('hr').innerText = h;
            document.getElementById('min').innerText = m;
            document.getElementById('sec').innerText = s;

            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('date-display').innerText = now.toLocaleDateString(undefined, options);

            // Auto-Night Mode Logic
            if (now.getHours() >= 21 || now.getHours() < 6) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        }

        function pixelShift() {
            const wrapper = document.getElementById('burn-in-wrapper');
            const x = Math.floor(Math.random() * 8) - 4;
            const y = Math.floor(Math.random() * 8) - 4;
            wrapper.style.transform = `translate(${x}px, ${y}px)`;
        }

        function initApp() {
            document.getElementById('start-overlay').style.display = 'none';
            requestWakeLock();
            setInterval(updateClock, 1000);
            setInterval(pixelShift, 45000); // Shift every 45s
            updateClock();
            
            // Handle Battery
            navigator.getBattery?.().then(battery => {
                const updateBat = () => {
                    document.getElementById('battery').innerText = `${battery.charging ? '⚡' : ''}${Math.round(battery.level * 100)}%`;
                };
                updateBat();
                battery.onlevelchange = updateBat;
                battery.onchargingchange = updateBat;
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
