<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SafariClock">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4843/4843058.png">
    <title>SafariClock | StandBy</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #ff3b30; /* Night Mode Red */
            --flip-speed: 0.6s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: color 0.5s ease;
        }

        /* Burn-in Protection Container */
        #burn-in-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 1s ease-in-out;
        }

        /* Flip Clock Styles */
        .clock {
            display: flex;
            gap: 15px;
            perspective: 1000px;
        }

        .flip-unit {
            position: relative;
            width: 120px;
            height: 180px;
            background: var(--card-bg);
            border-radius: 12px;
            font-size: 100px;
            font-weight: 700;
            line-height: 180px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .flip-unit::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 2px;
            background: rgba(0,0,0,0.6);
            z-index: 5;
        }

        /* Top Info Bar */
        .status-bar {
            position: absolute;
            top: 40px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 500;
            opacity: 0.8;
        }

        /* Night Mode Logic */
        body.night-mode {
            color: var(--accent-color);
        }
        body.night-mode .flip-unit {
            color: var(--accent-color);
            border: 1px solid #300;
        }

        /* Landscape Adjustments */
        @media (orientation: landscape) {
            #burn-in-wrapper { flex-direction: row; gap: 60px; }
            .flip-unit { width: 180px; height: 240px; font-size: 150px; line-height: 240px; }
        }

        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="initApp()">
        <p>Tap to Start SafariClock</p>
    </div>

    <div class="status-bar">
        <div id="weather">Loading Weather...</div>
        <div id="battery">--%</div>
    </div>

    <div id="burn-in-wrapper">
        <div class="clock">
            <div class="flip-unit" id="hr">00</div>
            <div class="flip-unit" id="min">00</div>
            <div class="flip-unit" id="sec">00</div>
        </div>
        <div id="date-display" style="font-size: 24px; letter-spacing: 2px;">LOADING DATE</div>
    </div>

    <script>
        // 1. Wake Lock API
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.error(`${err.name}, ${err.message}`); }
        }

        // 2. Clock Logic
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('hr').innerText = h;
            document.getElementById('min').innerText = m;
            document.getElementById('sec').innerText = s;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').innerText = now.toLocaleDateString(undefined, options).toUpperCase();

            // Auto-Night Mode (10 PM - 6 AM)
            const hour = now.getHours();
            if (hour >= 22 || hour < 6) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        }

        // 3. Burn-in Protection (Pixel Shifting)
        function pixelShift() {
            const wrapper = document.getElementById('burn-in-wrapper');
            const x = Math.floor(Math.random() * 10) - 5;
            const y = Math.floor(Math.random() * 10) - 5;
            wrapper.style.transform = `translate(${x}px, ${y}px)`;
        }

        // 4. Battery Status
        navigator.getBattery?.().then(battery => {
            const updateBattery = () => {
                const level = Math.round(battery.level * 100);
                document.getElementById('battery').innerText = `${battery.charging ? '⚡' : ''}${level}%`;
            };
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
            battery.addEventListener('chargingchange', updateBattery);
        });

        // 5. Basic Weather (Placeholder - requires API key for real data)
        function fetchWeather() {
            // In a real app, use: fetch(`https://api.openweathermap.org/data/2.5/weather?q=London&units=metric&appid=YOUR_KEY`)
            document.getElementById('weather').innerText = "Sunny 24°C";
        }

        // Initialize
        function initApp() {
            document.getElementById('start-overlay').style.display = 'none';
            requestWakeLock();
            setInterval(updateClock, 1000);
            setInterval(pixelShift, 60000); // Shift every minute
            fetchWeather();
            updateClock();
            
            // Go Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
